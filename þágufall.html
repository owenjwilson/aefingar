const genderLabel = { m: "kk", f: "kvk", n: "hvk" };
const genderClass = { m: "kk", f: "kvk", n: "hvk" };

function render() {

  const pct = Math.round(((idx + 1) / words.length) * 100);

  const html = `

      <div class="word-header">

          </tr>
        </tbody>
      </table>

      <div class="btn-row">
        <button class="btn-check" onclick="check()">Athuga svör</button>
        <button class="btn-show"  onclick="show()">Sýna svör</button>
        <button class="btn-nav"   onclick="prev()">← Til baka</button>
        <button class="btn-nav"   onclick="next()">Áfram →</button>
      </div>
    </div>
    <p class="counter">${idx + 1} / ${words.length}</p>
  `;

  document.getElementById("app").innerHTML = html;
  document.getElementById("tho_an").focus();
}

function check() {
  const w = words[idx];
  const fields = [
    { id: "tho_an",  correct: w.tho_an  },
    { id: "tho_med", correct: w.tho_med },
    { id: "tha_an",  correct: w.tha_an  },
    { id: "tha_med", correct: w.tha_med }
  ];
  fields.forEach(({ id, correct }) => {
    const input = document.getElementById(id);
    const val = input.value.trim().toLowerCase();
    input.classList.remove("correct", "incorrect", "shown");
    if (val === correct.toLowerCase()) {
      input.classList.add("correct");
    } else if (val !== "") {
      input.classList.add("incorrect");
    }
  });
}

function show() {
  const w = words[idx];
  [
    ["tho_an", w.tho_an], ["tho_med", w.tho_med],
    ["tha_an", w.tha_an], ["tha_med", w.tha_med]
  ].forEach(([id, val]) => {
    const input = document.getElementById(id);
    input.value = val;
    input.classList.remove("correct", "incorrect");
    input.classList.add("shown");
  });
}

function next() { idx = (idx + 1) % words.length; render(); }
function prev() { idx = (idx - 1 + words.length) % words.length; render(); }
